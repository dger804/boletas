services:
  - type: web
    name: boletas-api
    runtime: node
    plan: free
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.14.1
      - key: WEB_DIST_PATH
        value: apps/web/dist
      - key: PUBLIC_API_BASE_URL
        value: /api
      - key: CORS_ORIGIN
        sync: false
