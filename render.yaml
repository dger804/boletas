services:
  - type: web
    name: boletas-api
    runtime: node
    plan: free
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @boletas/api prisma:migrate:deploy && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.14.1
      - key: WEB_DIST_PATH
        value: apps/web/dist
      - key: PUBLIC_API_BASE_URL
        value: /api
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: AUTH_TOKEN_TTL_SECONDS
        value: 28800
