name: Seed Demo Database

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type seed-demo to run the demo seed as a Render one-off job"
        required: true
        type: string
      verify_api:
        description: "Verify protected API endpoints after seeding"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: seed-demo-database
  cancel-in-progress: false

jobs:
  seed:
    name: Seed demo data
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'seed-demo'
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      API_BASE_URL: https://api-boletas.corporacionceer.com/api

    steps:
      - name: Check required inputs and secrets
        shell: bash
        run: |
          {
            echo "### Seed demo preflight"
            echo
            echo "- Confirmation received: yes"
            echo "- RENDER_API_KEY secret configured: $([[ -n "$RENDER_API_KEY" ]] && echo yes || echo no)"
            echo "- RENDER_SERVICE_ID secret configured: $([[ -n "$RENDER_SERVICE_ID" ]] && echo yes || echo no)"
            echo "- ADMIN_API_TOKEN secret configured: $([[ -n "$ADMIN_API_TOKEN" ]] && echo yes || echo no)"
            echo "- API verification requested: ${{ github.event.inputs.verify_api }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -z "$RENDER_API_KEY" || -z "$RENDER_SERVICE_ID" ]]; then
            echo "::error::RENDER_API_KEY and RENDER_SERVICE_ID secrets are required in GitHub Actions."
            exit 1
          fi

          if [[ "${{ github.event.inputs.verify_api }}" == "true" && -z "$ADMIN_API_TOKEN" ]]; then
            echo "::warning::API verification was requested, but ADMIN_API_TOKEN is not configured in GitHub. The seed can still run; API verification will be skipped."
          fi

      - name: Create Render one-off seed job
        id: render-job
        shell: bash
        run: |
          response="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url "https://api.render.com/v1/services/$RENDER_SERVICE_ID/jobs" \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              --header "Content-Type: application/json" \
              --data-raw '{"startCommand":"pnpm db:seed"}'
          )"

          echo "$response" > /tmp/render-job.json
          job_id="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/render-job.json', 'utf8')); if (!data.id) throw new Error('Render response did not include job id'); console.log(data.id);")"

          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
          {
            echo
            echo "### Render job"
            echo
            echo "- Job id: $job_id"
            echo "- Start command: pnpm db:seed"
            echo "- Logs: Render Dashboard > boletas-api > Jobs"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for Render seed job
        shell: bash
        run: |
          job_id="${{ steps.render-job.outputs.job_id }}"

          for attempt in $(seq 1 120); do
            response="$(
              curl --fail-with-body --silent --show-error \
                --request GET \
                --url "https://api.render.com/v1/services/$RENDER_SERVICE_ID/jobs/$job_id" \
                --header "Authorization: Bearer $RENDER_API_KEY" \
                --header "Accept: application/json"
            )"

            echo "$response" > /tmp/render-job-status.json
            status="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/render-job-status.json', 'utf8')); console.log(data.status);")"
            echo "Render job $job_id status: $status"

            if [[ "$status" == "succeeded" ]]; then
              echo "- Final Render job status: succeeded" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            if [[ "$status" == "failed" || "$status" == "canceled" ]]; then
              echo "::error::Render one-off job $job_id finished with status $status. Check Render Dashboard > boletas-api > Jobs for logs."
              echo "- Final Render job status: $status" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            sleep 10
          done

          echo "::error::Timed out waiting for Render one-off job $job_id."
          echo "- Final Render job status: timeout" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Verify API with admin token
        if: github.event.inputs.verify_api == 'true'
        shell: bash
        run: |
          if [[ -z "$ADMIN_API_TOKEN" ]]; then
            echo "::warning::ADMIN_API_TOKEN secret is not configured in GitHub. API verification skipped."
            exit 0
          fi

          curl --fail --silent --show-error \
            --header "x-admin-token: $ADMIN_API_TOKEN" \
            "$API_BASE_URL/events" > /tmp/events.json

          curl --fail --silent --show-error \
            --header "x-admin-token: $ADMIN_API_TOKEN" \
            "$API_BASE_URL/events/evt_demo/dashboard" > /tmp/dashboard.json

          node -e "const fs=require('fs'); const events=JSON.parse(fs.readFileSync('/tmp/events.json','utf8')); const dashboard=JSON.parse(fs.readFileSync('/tmp/dashboard.json','utf8')); if (!events.some((event)=>event.id==='evt_demo')) throw new Error('evt_demo not found'); if (dashboard.event.id !== 'evt_demo') throw new Error('dashboard event mismatch'); console.log(JSON.stringify({ eventId: dashboard.event.id, tickets: dashboard.totals.tickets, paid: dashboard.totals.paid, used: dashboard.totals.used }));"
